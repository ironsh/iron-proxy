{{- if and (eq .Values.mode "managed") .Values.managed.token (not .Values.managed.existingTokenSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "iron-proxy.tokenSecretName" . }}
  labels:
    {{- include "iron-proxy.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.managed.token | quote }}
{{- end }}
