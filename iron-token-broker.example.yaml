# iron-token-broker example configuration.
#
# The broker owns the OAuth refresh-token state machine for one or more
# credentials and serves current access tokens to iron-proxy over HTTP.
# Use it when the upstream IdP rotates refresh tokens with strict reuse
# detection (OpenAI Codex, Anthropic Claude Code OAuth, modern Okta /
# Auth0 / Entra ID) and you run more than one iron-proxy against the
# same credential.

listen: ":8181"                       # broker HTTP API
metrics_listen: ":9091"               # Prometheus /metrics endpoint
bearer_auth_env: IRON_BROKER_TOKEN    # optional; omit to disable bearer auth

log:
  level: info                         # debug | info | warn | error
  format: text                        # text | json

defaults:
  early_refresh_slack: "5m"           # refresh this far before expires_at
  early_refresh_fraction: 0.2         # ...or this fraction of TTL, whichever is larger
  max_refresh_interval: "24h"         # keep-alive ceiling so idle creds don't age out
  refresh_timeout: "30s"              # per-attempt HTTP timeout against the IdP

credentials:
  # OpenAI Codex — public client, no client_secret. The shipped UUIDs
  # below are placeholders; copy yours from the 1Password UI with the
  # right-click "Copy Item UUID" action.
  - id: openai-codex
    token_endpoint: https://auth.openai.com/oauth/token
    client_id:
      type: env
      var: OPENAI_CODEX_CLIENT_ID
    store:
      type: 1password
      secret_ref: "op://abcd1234efgh5678ijkl9012mn/1234abcd5678efgh9012ijkl3m/credential_blob"
    # Codex invalidates refresh tokens after roughly 8 days of inactivity;
    # a 12-hour ceiling keeps the family alive even on idle deployments.
    max_refresh_interval: "12h"

  # Anthropic Claude Code OAuth — public client, file-backed store. The
  # file lives on whichever single host runs this broker; do not run
  # multiple brokers against the same file.
  - id: anthropic-claude
    token_endpoint: https://console.anthropic.com/v1/oauth/token
    client_id:
      type: env
      var: ANTHROPIC_CLIENT_ID
    store:
      type: file
      path: /var/lib/iron-token-broker/anthropic-claude.json

  # A confidential client backed by AWS Secrets Manager. The client_id
  # and client_secret can come from any of iron-proxy's secret sources
  # (env, 1password, 1password_connect, aws_sm, aws_ssm); the store
  # uses the same provider catalogue minus env (env is read-only).
  - id: example-okta
    token_endpoint: https://example.okta.com/oauth2/default/v1/token
    scopes: ["openid", "offline_access"]
    client_id:
      type: aws_sm
      secret_id: iron-broker/okta/client_id
    client_secret:
      type: aws_sm
      secret_id: iron-broker/okta/client_secret
    store:
      type: aws_sm
      secret_id: iron-broker/okta/credential_blob
      region: us-east-1

  # A vendor that requires an api-key header on the token endpoint in
  # addition to the standard form-body client_id/client_secret. Mirrors
  # the oauth_token transform's token_endpoint_headers: each value is a
  # discrete secret source, header names go on the wire verbatim.
  - id: example-vendor
    token_endpoint: https://api.example-vendor.com/oauth/token
    client_id:     {type: env, var: EXAMPLE_VENDOR_CLIENT_ID}
    client_secret: {type: env, var: EXAMPLE_VENDOR_CLIENT_SECRET}
    token_endpoint_headers:
      x-api-key: {type: env, var: EXAMPLE_VENDOR_API_KEY}
    store:
      type: file
      path: /var/lib/iron-token-broker/example-vendor.json
