version: 2

builds:
  - id: linux-amd64
    main: ./cmd/iron-proxy
    binary: iron-proxy
    env:
      - CGO_ENABLED=1
      - CC=zig cc -target x86_64-linux-gnu
      - CXX=zig c++ -target x86_64-linux-gnu
    goos: [linux]
    goarch: [amd64]
    ldflags:
      - -s -w -X github.com/ironsh/iron-proxy/internal/version.Version={{.Version}}

  - id: linux-arm64
    main: ./cmd/iron-proxy
    binary: iron-proxy
    env:
      - CGO_ENABLED=1
      - CC=zig cc -target aarch64-linux-gnu
      - CXX=zig c++ -target aarch64-linux-gnu
    goos: [linux]
    goarch: [arm64]
    ldflags:
      - -s -w -X github.com/ironsh/iron-proxy/internal/version.Version={{.Version}}

  - id: darwin-amd64
    main: ./cmd/iron-proxy
    binary: iron-proxy
    env:
      - CGO_ENABLED=1
      - CC=zig cc -target x86_64-macos
      - CXX=zig c++ -target x86_64-macos
    goos: [darwin]
    goarch: [amd64]
    ldflags:
      - -s -w -X github.com/ironsh/iron-proxy/internal/version.Version={{.Version}}

  - id: darwin-arm64
    main: ./cmd/iron-proxy
    binary: iron-proxy
    env:
      - CGO_ENABLED=1
      - CC=zig cc -target aarch64-macos
      - CXX=zig c++ -target aarch64-macos
    goos: [darwin]
    goarch: [arm64]
    ldflags:
      - -s -w -X github.com/ironsh/iron-proxy/internal/version.Version={{.Version}}

archives:
  - formats: ["tar.gz"]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

dockers_v2:
  - images:
      - "ironsh/iron-proxy"
    tags:
      - "{{ .Version }}"
      - "latest"
    dockerfile: Dockerfile.release

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
