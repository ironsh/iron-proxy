name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ironsh/iron-proxy-action@fa1fd82ec32396d044deba7040a6db576bec927a # v0.1.4
        with:
          egress-rules: egress-rules.yaml

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: Run tests
        run: go test -v -race -count=1 ./...

      - uses: ironsh/iron-proxy-action/summary@fa1fd82ec32396d044deba7040a6db576bec927a # v0.1.4
        if: always()

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ironsh/iron-proxy-action@fa1fd82ec32396d044deba7040a6db576bec927a # v0.1.4
        with:
          egress-rules: egress-rules.yaml
          disable-docker: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: Build iron-proxy
        run: go build -o iron-proxy ./cmd/iron-proxy

      - name: Generate test CA
        run: ./iron-proxy generate-ca -outdir tmp -alg ed25519

      - name: Start 1Password Connect server
        working-directory: integration_test/op_connect
        env:
          OP_CONNECT_CREDENTIALS_JSON: ${{ secrets.OP_CONNECT_CREDENTIALS_JSON }}
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}
        run: |
          printf '%s' "$OP_CONNECT_CREDENTIALS_JSON" > 1password-credentials.json
          docker compose up -d
          # Wait for connect-sync to populate the shared data volume so the
          # API can actually serve vault contents. /heartbeat returns 200 as
          # soon as the API process is listening, so we probe /v1/vaults
          # (auth required) instead.
          for i in $(seq 1 30); do
            code=$(curl -s --max-time 2 -o /tmp/vaults.out -w '%{http_code}' \
              -H "Authorization: Bearer $OP_CONNECT_TOKEN" \
              http://localhost:8080/v1/vaults || true)
            echo "attempt $i: /v1/vaults -> $code"
            if [ "$code" = "200" ]; then
              echo "Connect server is ready (vault sync complete)"
              exit 0
            fi
            sleep 1
          done
          echo "Connect server failed to become ready (last status: $code)" >&2
          cat /tmp/vaults.out >&2 || true
          docker compose logs
          exit 1

      # The BigQuery service account key is stored base64-encoded in
      # secrets so GitHub Actions' substring-based secret redaction doesn't
      # mangle unrelated job output that happens to share fragments with the
      # JSON keyfile (project id, common phrases, etc.). Decode it here and
      # expose the JSON to the test step as a normal env var.
      - name: Decode BigQuery service account key
        env:
          GCP_BIGQUERY_SERVICE_ACCOUNT_KEY_B64: ${{ secrets.GCP_BIGQUERY_SERVICE_ACCOUNT_KEY_B64 }}
        run: |
          if [ -z "$GCP_BIGQUERY_SERVICE_ACCOUNT_KEY_B64" ]; then
            echo "GCP_BIGQUERY_SERVICE_ACCOUNT_KEY_B64 not set; BigQuery test will skip"
            exit 0
          fi
          {
            echo "GCP_BIGQUERY_SERVICE_ACCOUNT_KEY<<__IRON_EOF__"
            printf '%s' "$GCP_BIGQUERY_SERVICE_ACCOUNT_KEY_B64" | base64 -d
            echo
            echo "__IRON_EOF__"
          } >> "$GITHUB_ENV"

      - name: Run integration tests
        run: go test -v -race -count=1 ./integration_test/ -integration
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-west-1
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_CONNECT_HOST: http://localhost:8080
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}

      - name: Dump 1Password Connect logs
        if: failure()
        working-directory: integration_test/op_connect
        run: docker compose logs || true

      - name: Stop 1Password Connect server
        if: always()
        working-directory: integration_test/op_connect
        run: |
          docker compose down -v || true
          rm -f 1password-credentials.json

      - uses: ironsh/iron-proxy-action/summary@fa1fd82ec32396d044deba7040a6db576bec927a # v0.1.4
        if: always()

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ironsh/iron-proxy-action@fa1fd82ec32396d044deba7040a6db576bec927a # v0.1.4
        with:
          egress-rules: egress-rules.yaml

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: go vet
        run: go vet ./...

      - uses: ironsh/iron-proxy-action/summary@fa1fd82ec32396d044deba7040a6db576bec927a # v0.1.4
        if: always()

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ironsh/iron-proxy-action@fa1fd82ec32396d044deba7040a6db576bec927a # v0.1.4
        with:
          egress-rules: egress-rules.yaml

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: latest
          install-mode: binary

      - uses: ironsh/iron-proxy-action/summary@fa1fd82ec32396d044deba7040a6db576bec927a # v0.1.4
        if: always()

  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ironsh/iron-proxy-action@fa1fd82ec32396d044deba7040a6db576bec927a # v0.1.4
        with:
          egress-rules: egress-rules.yaml

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - uses: ironsh/iron-proxy-action/summary@fa1fd82ec32396d044deba7040a6db576bec927a # v0.1.4
        if: always()
