dns:
  proxy_ip: "127.0.0.1"
  listen: "127.0.0.1:0"

proxy:
  http_listen: "127.0.0.1:0"
  https_listen: "127.0.0.1:0"
  max_request_body_bytes: 1048576
  upstream_deny_cidrs: []

tls:
  ca_cert: tmp/ca.crt
  ca_key: tmp/ca.key

transforms:
  - name: allowlist
    config:
      domains:
        - "127.0.0.1"

  - name: aws_auth
    config:
      region: us-east-1
      service: bedrock
      access_key_id:     {type: env, var: AWS_ACCESS_KEY_ID}
      secret_access_key: {type: env, var: AWS_SECRET_ACCESS_KEY}
      session_token:     {type: env, var: AWS_SESSION_TOKEN}
      rules:
        - host: "127.0.0.1"

metrics:
  listen: "127.0.0.1:0"

log:
  level: info
