dns:
  proxy_ip: "127.0.0.1"
  listen: "127.0.0.1:0"

proxy:
  http_listen: "127.0.0.1:0"
  https_listen: "127.0.0.1:0"
  max_request_body_bytes: 1048576
  upstream_deny_cidrs: []

tls:
  ca_cert: tmp/ca.crt
  ca_key: tmp/ca.key

transforms:
  - name: allowlist
    config:
      domains:
        - "127.0.0.1"
        - "only-in-config-b.example"

  - name: secrets
    config:
      secrets:
        - source:
            type: env
            var: IRON_RELOAD_ITEST_SECRET_B
          proxy_value: "proxy-reload-token"
          match_headers: ["X-Reload-Secret"]
          rules:
            - host: "127.0.0.1"

management:
  listen: "{{.MgmtAddr}}"
  api_key_env: IRON_RELOAD_ITEST_API_KEY

metrics:
  listen: "127.0.0.1:0"

log:
  level: info
