dns:
  proxy_ip: "127.0.0.1"
  listen: "127.0.0.1:0"

proxy:
  http_listen: "127.0.0.1:0"
  https_listen: "127.0.0.1:0"
  max_request_body_bytes: 1048576
  upstream_deny_cidrs: []

tls:
  ca_cert: tmp/ca.crt
  ca_key: tmp/ca.key

transforms:
  - name: allowlist
    config:
      domains:
        - "127.0.0.1"

  - name: judge
    config:
      name: "body-policy"
      fallback: "deny"
      timeout: "30s"
      rules:
        - host: "127.0.0.1"
      provider:
        type: "openai"
        model: "gpt-5.4-nano"
        api_key_env: "OPENAI_API_KEY"
        max_tokens: 128
      prompt: |
        Inspect the request body. DENY the request if the body contains
        the word "banana" (case-insensitive, as a whole word or part of
        a larger word). ALLOW every other request.

        The decision depends solely on whether the body contains that
        word. Ignore the URL path, headers, and method.

metrics:
  listen: "127.0.0.1:0"

log:
  level: info
