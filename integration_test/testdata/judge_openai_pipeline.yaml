dns:
  proxy_ip: "127.0.0.1"
  listen: "127.0.0.1:0"

proxy:
  http_listen: "127.0.0.1:0"
  https_listen: "127.0.0.1:0"
  max_request_body_bytes: 1048576

tls:
  ca_cert: tmp/ca.crt
  ca_key: tmp/ca.key

transforms:
  - name: allowlist
    config:
      domains:
        - "127.0.0.1"

  - name: judge
    config:
      name: "path-policy"
      fallback: "deny"
      timeout: "30s"
      rules:
        - host: "127.0.0.1"
      provider:
        type: "openai"
        model: "gpt-4o-mini"
        api_key_env: "OPENAI_API_KEY"
        max_tokens: 128
      prompt: |
        Apply this policy to the HTTP request:

        - ALLOW requests whose URL path is exactly "/allowed".
        - DENY every other path, including "/denied" and any path that is
          not exactly "/allowed".

        The decision depends solely on the path. Ignore anything else in
        the request.

metrics:
  listen: "127.0.0.1:0"

log:
  level: info
