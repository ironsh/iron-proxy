dns:
  proxy_ip: "127.0.0.1"
  listen: "127.0.0.1:0"

proxy:
  http_listen: "127.0.0.1:0"
  https_listen: "127.0.0.1:0"
  upstream_deny_cidrs: []

tls:
  ca_cert: tmp/ca.crt
  ca_key: tmp/ca.key

postgres:
  listen: "127.0.0.1:0"
  client:
    user: app_user
    password_env: PG_PROXY_PASSWORD
  upstreams:
    - database: appdb
      dsn:
        type: env
        var: PG_UPSTREAM_DSN
      role: tenant_role
      settings:
        - name: app.tenant_label
          value: centaur

metrics:
  listen: "127.0.0.1:0"

log:
  level: info
