dns:
  proxy_ip: "127.0.0.1"
  listen: "127.0.0.1:0"

proxy:
  http_listen: "127.0.0.1:0"
  https_listen: "127.0.0.1:0"
  upstream_deny_cidrs: []

tls:
  ca_cert: tmp/ca.crt
  ca_key: tmp/ca.key

postgres:
  listen: "127.0.0.1:0"
  client:
    user: app_user
    password_env: PG_PROXY_PASSWORD
  upstreams:
    # Two upstreams routing to two distinct databases, each injecting its own
    # role. Each upstream's database must match the database its DSN connects to.
    - database: appdb
      dsn:
        type: env
        var: PG_UPSTREAM_DSN
      role: tenant_role

    - database: otherdb
      dsn:
        type: env
        var: PG_OTHER_DSN
      role: other_role

    # Deliberately misconfigured: the routing database "mismatch" does not match
    # the DSN's database (appdb). The proxy must reject clients that connect to
    # it rather than silently land them on appdb.
    - database: mismatch
      dsn:
        type: env
        var: PG_UPSTREAM_DSN
      role: tenant_role

metrics:
  listen: "127.0.0.1:0"

log:
  level: info
