dns:
  proxy_ip: "127.0.0.1"
  listen: "127.0.0.1:0"

proxy:
  http_listen: "127.0.0.1:0"
  https_listen: "127.0.0.1:0"
  upstream_deny_cidrs: []

tls:
  ca_cert: tmp/ca.crt
  ca_key: tmp/ca.key

postgres:
  listen: "127.0.0.1:0"
  upstreams:
    # Both upstreams front the same physical database (appdb) but inject a
    # different role. The client picks the upstream by the database name it
    # requests; the upstream database is whatever the DSN names.
    - database: tenant
      dsn:
        type: env
        var: PG_UPSTREAM_DSN
      client:
        user: app_user
        password_env: PG_PROXY_PASSWORD
      role: tenant_role

    - database: other
      dsn:
        type: env
        var: PG_UPSTREAM_DSN
      client:
        user: app_user
        password_env: PG_PROXY_PASSWORD
      role: other_role

metrics:
  listen: "127.0.0.1:0"

log:
  level: info
