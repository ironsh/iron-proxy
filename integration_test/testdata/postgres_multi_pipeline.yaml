dns:
  proxy_ip: "127.0.0.1"
  listen: "127.0.0.1:0"

proxy:
  http_listen: "127.0.0.1:0"
  https_listen: "127.0.0.1:0"
  upstream_deny_cidrs: []

tls:
  ca_cert: tmp/ca.crt
  ca_key: tmp/ca.key

postgres:
  - name: primary
    listen: "127.0.0.1:0"
    upstream:
      dsn:
        type: env
        var: PG_UPSTREAM_DSN
    client:
      user: app_user
      password_env: PG_PROXY_PASSWORD
    role: tenant_role

  - name: secondary
    listen: "127.0.0.1:0"
    upstream:
      dsn:
        type: env
        var: PG_UPSTREAM_DSN
    client:
      user: app_user
      password_env: PG_PROXY_PASSWORD
    role: other_role

metrics:
  listen: "127.0.0.1:0"

log:
  level: info
