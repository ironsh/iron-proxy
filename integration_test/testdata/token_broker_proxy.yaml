dns:
  proxy_ip: "127.0.0.1"
  listen: "127.0.0.1:0"

proxy:
  http_listen: "127.0.0.1:0"
  https_listen: "127.0.0.1:0"
  max_request_body_bytes: 1048576
  upstream_deny_cidrs: []

tls:
  ca_cert: tmp/ca.crt
  ca_key: tmp/ca.key

transforms:
  - name: allowlist
    config:
      domains:
        - "127.0.0.1"

  - name: secrets
    config:
      secrets:
        - source:
            type: token_broker
            credential_id: openai-codex
            ttl: "5s"
          inject:
            header: Authorization
            # {{`...`}} escapes the inner expression so renderConfig leaves
            # the secrets-transform formatter template intact.
            formatter: "Bearer {{`{{.Value}}`}}"
          rules:
            - host: "127.0.0.1"

metrics:
  listen: "127.0.0.1:0"

log:
  level: info
